<!DOCTYPE html>
<html>
<head>
<link rel=stylesheet type="text/css" href="/house.css" title="House">
<script>

const DepthMax = 256
var Depth = DepthMax;
var relayLastTimestamp = 0;

var relayLastHistory = new Array();

function relayShowInput (points) {

    var table = document.getElementById ('pointlist');
    for (var i = table.rows.length - 1; i > 0; i--) {
        table.deleteRow(i);
    }

    var present = new Array();
    for (const [key, value] of Object.entries(points).sort()) {

        if (value.mode !== "input") continue;
        var row = table.insertRow();

        var column = document.createElement("td");
        column.innerHTML = key;
        row.appendChild(column);

        var column = document.createElement("td");
        column.id = 'graph-'+key;
        row.appendChild(column);

        present[key] = true;
        if (!relayLastHistory[key]) { // New point.
           relayLastHistory[key] = new Array();
        }
    }
    // Purge input points that have disappeared.
    for (const [key, value] of Object.entries(relayLastHistory)) {
        if (!present[key]) delete relayLastHistory[key];
    }
}

function relayShowChanges (response) {

    if (response.control.status) {
        var title = response.host+' - Changes';
        document.getElementsByTagName ('title')[0].innerHTML = title;
        relayShowInput (response.control.status);
    }

    if (!response.control.history) return;

    if (response.control.history.depth) {
        Depth = response.control.history.depth;
        if (Depth > DepthMax) Depth = DepthMax;
    }

    var step = response.control.history.step;
    var updlen = response.control.history.end / step;
    updlen = Math.floor (updlen);

    relayLastTimestamp =
        response.control.history.start + response.control.history.end;

    var cursor = 0;
    var points = response.control.history.data;
    if (!points) points = Array(0);
    var names = response.control.history.names;

    // Update the local history of the input points.
    for (var i = 0; i < points.length; ++i) {
        var history;
        var change = points[i];
        var delta = Math.floor (change[0] / step);
        var index = change[1];

        // This might be a second change simultanous to a previous one.
        if (delta <= 0) {
            var key = names[index];
            if (relayLastHistory[key]) {
               var history = relayLastHistory[key];
               history[history.length-1] = change[2];
               relayLastHistory[key] = history;
            }
           continue;
        }

        // No change occurred during that delta time,
        // except for the specified point.
        cursor += delta;
        for (var j = 0; j < names.length; ++j) {
            var key = names[j];

            // Retrieve the last known state.
            var laststate = 0;
            if (relayLastHistory[key]) {
                var lasthistory = relayLastHistory[key];
                if (lasthistory.length > 0)
                    laststate = lasthistory[lasthistory.length-1];
            }
            // Build the sequence of states until that change.
            var update;
            if (j == index) {
               update = Array(delta-1).fill(laststate);
               update.push (change[2]);
            } else {
               update = Array(delta).fill(laststate);
            }
            // Append this update to the point's history.
            if (relayLastHistory[key]) {
               history = relayLastHistory[key].concat (update);
            } else {
               history = update;
            }
            if (history.length > Depth) {
               history = history.slice (history.length-Depth);
            }
            relayLastHistory[key] = history;
        }
    }

    // Fill the remaining time between the last change and the end of
    // the covered period.
    if (cursor < updlen) {
        var postamble = updlen - cursor;
        for (var j = 0; j < names.length; ++j) {
            var key = names[j];
            var lasthistory = relayLastHistory[key];
            laststate = lasthistory[lasthistory.length-1];
            var update = update = Array(postamble).fill(laststate);
            history = relayLastHistory[key].concat (update);
            if (history.length > Depth) {
                history = history.slice (history.length-Depth);
            }
            relayLastHistory[key] = history;
        }
    }

    // Show the new, updated history.
    //
    for (const [key, value] of Object.entries(relayLastHistory)) {
        var graph = document.getElementById ('graph-'+key);
        // TBD: SVG graph instead of semi-graphic?
        graph.innerHTML = value.join("").replace(/0/g, ".").replace(/1/g, "&#x00B7");
    }
}

function relayChanges () {
    var url = "/relays/changes";
    if (relayLastTimestamp) {
       url += "?since=" + relayLastTimestamp;
       if (Date.now() % 30 == 0) url += "&sync=1";
    } else {
       url += "?sync=1";
    }
    var command = new XMLHttpRequest();
    command.open("GET", url);
    command.onreadystatechange = function () {
        if (command.readyState === 4 && command.status === 200) {
            response = JSON.parse(command.responseText);
            relayShowChanges (response);
        }
    }
    command.send(null);
}

window.onload = function() {

   relayChanges();
   setInterval (relayChanges, 500);
};
</script>
<head>
   <title>Changes</title>
</head>
<body>
   <header>
   <table>
   <tr>
   <td><a href="/relays/index.html">Relays</a></td>
   <td><span>Changes</span></td>
   <td><a href="/relays/events.html">Events</a></td>
   <td><a href="/relays/config.html">Config</a></td>
   </tr>
   </table>
   </header>
   <section>
   <table id="pointlist" class="housewidetable iolist" border="0">
      <tr>
         <th width="10%">NAME</th>
         <th width="90%">DATA</th>
      </tr>
   </table>
   </section>
</body>
</html>
